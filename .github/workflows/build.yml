name: Build Android APKs

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [ControlGastosMoto, ProgramadorLabores, MonitoreoBrocaRoya]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.app }}-${{ hashFiles('${{ matrix.app }}/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ matrix.app }}-

      - name: Grant execute permission
        run: chmod +x ${{ matrix.app }}/gradlew

      - name: Build APK
        working-directory: ${{ matrix.app }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-debug
          path: ${{ matrix.app }}/app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: apks/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: apks/*/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
